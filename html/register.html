<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MindCare | Login</title>


<style>

/* ===== BASIC ===== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}


body{

    background:#f8f9f3;
    color:#264653;

}



/* ===== HEADER ===== */


header{

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:20px 50px;

    background:
    linear-gradient(
    90deg,
    #2f6b3f,
    #457b9d
    );

    color:white;

    box-shadow:0 5px 15px rgba(0,0,0,.2);

}



.logo{

    font-size:28px;

    animation:logoMove 3s infinite;

}



nav a{

    color:white;

    text-decoration:none;

    margin:10px;

    transition:.5s;

}



nav a:hover{

    color:#a7c957;

    transform:translateY(-5px);

}



/* ===== LOGIN SECTION ===== */


.login-page{


min-height:80vh;


display:flex;

justify-content:center;

align-items:center;


background:


linear-gradient(
rgba(47,107,63,.45),
rgba(69,123,157,.45)
),


url("images/nature.jpg");


background-size:cover;

background-position:center;


}





/* ===== LOGIN CARD ===== */


.login-box{


width:420px;


padding:45px;


background:

rgba(255,255,255,.85);


backdrop-filter:blur(10px);


border-radius:25px;


box-shadow:

0 15px 35px rgba(0,0,0,.3);


animation:

loginShow 1.5s ease;


}




.login-box h1{


text-align:center;

color:#2f6b3f;

margin-bottom:15px;


font-size:35px;


}



.login-box p{


text-align:center;

margin-bottom:25px;


}




label{


display:block;

font-weight:bold;

color:#2f6b3f;

margin-top:15px;


}



input{


width:100%;


padding:14px;


margin-top:8px;


border-radius:15px;


border:1px solid #a7c957;


outline:none;


transition:.4s;


}



input:focus{


transform:scale(1.03);

border-color:#2f6b3f;


}




button{


width:100%;


margin-top:25px;


padding:15px;


border:none;


border-radius:30px;


background:#6a994e;


color:white;


font-size:18px;


cursor:pointer;


transition:.5s;


}



button:hover{


background:#2f6b3f;


transform:

translateY(-5px);


box-shadow:

0 10px 20px rgba(0,0,0,.3);


}




.small-text{


font-size:14px;

margin-top:20px;

}



/* ===== FOOTER ===== */


footer{


background:#264653;

color:white;

padding:25px;

text-align:center;


}



/* ===== ANIMATION ===== */


@keyframes loginShow{


from{

opacity:0;

transform:translateY(60px);

}


to{

opacity:1;

transform:translateY(0);

}


}



@keyframes logoMove{


0%,100%{

transform:rotate(0);

}


50%{

transform:rotate(10deg);

}


}




/* ===== MOBILE ===== */


@media(max-width:800px){


header{

flex-direction:column;

}


nav{

margin-top:15px;

text-align:center;

}


.login-box{

width:90%;

}


}


</style>

<link rel="stylesheet" href="../Css/shared-header.css">

</head>



<body>



<header>


<div class="logo">

🌿 MindCare

</div>



<nav>


<a href="home.html">Home</a>

<a href="login.html" class="active">Login</a>

<a href="stress.html">Stress</a>

<a href="meditation.html">Meditation</a>

<a href="sleep.html">Sleep</a>

<a href="lifestyle.html">Lifestyle</a>

<a href="doctors.html">Doctors</a>

<a href="videos.html">Videos</a>

<a href="gallery.html">Gallery</a>

<a href="map.html">Map</a>


<a href="contact.html">Contact</a>


</nav>


</header>





<!-- LOGIN -->


<section class="login-page">


<div class="login-box">


<h1>
🌱 Welcome Back
</h1>


<p>
Continue your peaceful wellness journey
</p>



<form>

<label>
Name
</label>


<input 
type="text"
placeholder="Enter your name">

<label>
Email Address
</label>


<input 
type="email"
placeholder="Enter your email">





<label>
Password
</label>


<input 
type="password"
placeholder="Enter password">





<button>
    Register
</button>


</form>



<p class="small-text">

Already have an account? <a href="login.html">Login here</a> to begin your nature wellness journey 🌿

</p>



</div>


</section>





<footer>

<p>
© 2026 MindCare Wellness | HTML + CSS Project
</p>

</footer>



</body>

</html>
